- &id_ess_temp_trigger_setting_src
  id: ess_temp_trigger_setting_src
  type: dummy_notify
  dtype: uint8
  config:
    init_value: 0
    interval_us: 20000
- &id_ess_temp_sampling_function_cfg
  id: ess_temp_sampling_function_cfg
  type: config
  dtype: uint32
  rw: true
  config:
