metadata:
  title: NTFC NimBLE all-services target
  version: '1.0'
  description: >
    NTFC-only descriptor that enables every supported Dawn NimBLE service
    (DIS, BAS, TPS, AIOS, ESS, IMDS, OTS) backed entirely by fake GPIO
    and dummy notify IOs. Used by the nrf52840-dk nimble_ntfc board configuration to
    expose one peripheral that the host-side NTFC suites can exercise
    end-to-end without touching real hardware. The GAP advertising name
    is ntfc-nimble; every test discovers the device by that name. Keep
    this at 16 bytes or less unless the firmware GAP name buffer is raised.
  os_required:
  - /dev/gpio0
  - /dev/gpio1
  - /dev/gpio2
  - /dev/gpio3
  - /dev/gpio4
  - /dev/gpio5
  - /dev/gpio6
  - /dev/gpio7
  - ble
ios:
- &id_bas_battery
  id: bas_battery
  type: dummy_notify
  dtype: uint8
  config:
    init_value: 42
    interval_us: 20000
- &id_aios_analog
  id: aios_analog
  type: dummy_notify
  dtype: float
  config:
    init_value: 1.5
    interval_us: 20000
- &id_aios_analog_rw
  id: aios_analog_rw
  type: dummy_notify
  dtype: float
  config:
    init_value: 0.0
    interval_us: 20000
- &id_aios_gpi1
  id: aios_gpi1
  type: gpi
  dtype: bool
  config:
    device: 0
- &id_aios_gpi2
  id: aios_gpi2
  type: gpi
  dtype: bool
  config:
    device: 1
- &id_aios_gpi3
  id: aios_gpi3
  type: gpi
  dtype: bool
  config:
    device: 2
- &id_aios_gpi4
  id: aios_gpi4
  type: gpi
  dtype: bool
  config:
    device: 3
- &id_aios_gpo1
  id: aios_gpo1
  type: gpo
  dtype: bool
  config:
    device: 4
- &id_aios_gpo2
  id: aios_gpo2
  type: gpo
  dtype: bool
  config:
    device: 5
- &id_aios_gpo3
  id: aios_gpo3
  type: gpo
  dtype: bool
  config:
    device: 6
- &id_aios_gpo4
  id: aios_gpo4
  type: gpo
  dtype: bool
  config:
    device: 7
- &id_aios_digital_rw
  id: aios_digital_rw
  type: dummy_notify
  dtype: bool
  config:
    init_value: false
    interval_us: 20000
- &id_aios_value_trigger_setting_src
  id: aios_value_trigger_setting_src
  type: dummy_notify
  dtype: uint8
  config:
    init_value: 0
    interval_us: 20000
- &id_aios_value_trigger_setting_cfg
  id: aios_value_trigger_setting_cfg
  type: config
  dtype: uint8
  rw: true
  config:
    objid_ref: *id_aios_value_trigger_setting_src
    objcfg_ref: init_value
- &id_aios_time_trigger_setting_src
  id: aios_time_trigger_setting_src
  type: dummy_notify
  dtype: uint8
  config:
    init_value: 0
    interval_us: 20000
- &id_aios_time_trigger_setting_cfg
  id: aios_time_trigger_setting_cfg
  type: config
  dtype: uint8
  rw: true
  config:
