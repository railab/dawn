metadata:
  title: QEMU Modbus TCP Dummy Map
  version: '1.0'
  description: >
    Provides a Modbus TCP register map over qemu-intel64 backed by a large dummy IO set
    covering coil, packed coil, holding, and input register access.
  os_required:
  - eth

