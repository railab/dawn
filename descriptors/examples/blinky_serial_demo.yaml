metadata:
  title: Blinky Serial Demo
  version: "1.0"
  description: >
    Sequencer-based LED blinky demo controlled over the Dawn serial protocol.
    The sequencer drives the board LED lower-half with a two-state 500 ms
    on/off cycle and exposes runtime start/stop plus writable dwell timing.
  os_required:
    - /dev/leds0
    - /dev/ttyS0

ios:
  - id: led1
    type: leds
    dtype: uint32
    config:
      device: 0

includes:
  - id: blinky
    path: include_blocks/blinky_common.yaml
    inputs:
      led: led1

protocols:
  - id: serial1
    type: serial
    bindings:
      - "@blinky.led1"
      - "@blinky.ctrl_blinky"
      - "@blinky.cfg_seq_start"
      - "@blinky.cfg_dwell_off"
      - "@blinky.cfg_dwell_on"
    config:
      path: /dev/ttyS0
      baudrate: 115200
