metadata:
  title: Blinky CAN Demo
  version: "1.0"
  description: >
    Sequencer-based LED blinky demo controlled over CAN. The sequencer drives
    LED output with a two-state value/dwell table. CAN frames expose LED state,
    start/stop control, reset trigger, start index, individual dwell values,
    and segmented access to the full sequencer state table.
  os_required:
    - /dev/can0
    - /dev/leds0

ios:
  - id: led1
    type: leds
    dtype: uint32
    config:
      device: 0

includes:
  - id: blinky
    path: include_blocks/blinky_common.yaml
    inputs:
      led: led1

protocols:
  - id: can_main
    type: can
    config:
      node_id: 0
      objects:
        - type: read
          flags: 0
          can_id_start: 0x100
          bindings:
            - "@blinky.led1"
            - "@blinky.ctrl_blinky"
            - "@blinky.cfg_seq_start"
            - "@blinky.cfg_dwell_off"
            - "@blinky.cfg_dwell_on"

        - type: write
          flags: 0
          can_id_start: 0x150
          bindings:
            - "@blinky.ctrl_blinky"

        - type: write
          flags: 0
          can_id_start: 0x151
          bindings:
            - "@blinky.trig_blinky"

        - type: write
          flags: 0
          can_id_start: 0x152
          bindings:
            - "@blinky.cfg_seq_start"

        - type: write
          flags: 0
          can_id_start: 0x153
          bindings:
            - "@blinky.cfg_dwell_off"

        - type: write
          flags: 0
          can_id_start: 0x154
          bindings:
            - "@blinky.cfg_dwell_on"

        - type: read_seg
          flags: 0
          can_id_start: 0x160
          bindings:
            - "@blinky.cfg_seq_states"

        - type: write_seg
          flags: 0
          can_id_start: 0x170
          bindings:
            - "@blinky.cfg_seq_states"
