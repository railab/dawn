metadata:
  title: Blinky CAN Demo
  version: "1.0"
  description: >
    Sequencer-based LED blinky demo controlled over CAN. The sequencer drives
    LED output with a two-state value/dwell table. CAN frames expose LED state,
    start/stop control, reset trigger, start index, individual dwell values,
    and segmented access to the full sequencer state table.
  os_required:
    - /dev/can0
    - /dev/leds0

ios:
  - &led1
    id: led1
    type: leds
    dtype: uint32
    config:
      device: 0

  - &ctrl_blinky
    id: ctrl_blinky
    type: control
    config:
      targets:
        - blinky_seq1
      allowed:
        - start
        - stop

  - &trig_blinky
    id: trig_blinky
    type: trigger
    config:
      targets:
        - blinky_seq1
      allowed:
        - reset

  - &cfg_seq_start
    id: cfg_seq_start
    type: config
    dtype: uint32
    rw: true
    config:
      objid_ref: blinky_seq1
      objcfg_ref: start_index

  - &cfg_seq_states
    id: cfg_seq_states
    type: config
    dtype: uint32
    rw: true
    config:
      objid_ref: blinky_seq1
      objcfg_ref: states

  - &cfg_dwell_off
    id: cfg_dwell_off
    type: config
    dtype: uint32
    rw: true
    config:
      objid_ref: blinky_seq1
      objcfg_ref: states
      field: dwell_off

  - &cfg_dwell_on
    id: cfg_dwell_on
    type: config
    dtype: uint32
    rw: true
    config:
      objid_ref: blinky_seq1
      objcfg_ref: states
      field: dwell_on

programs:
  - id: blinky_seq1
    type: sequencer
    config:
      targets:
        - led1
      states:
        - value: 0
          dwell_us: 500000
        - value: 1
          dwell_us: 500000
      start_index: 0

protocols:
  - id: can_main
    type: can
    config:
      node_id: 0
      objects:
        - type: read
          flags: 0
          can_id_start: 0x100
          bindings:
            - *led1
            - *ctrl_blinky
            - *cfg_seq_start
            - *cfg_dwell_off
            - *cfg_dwell_on

        - type: write
          flags: 0
          can_id_start: 0x150
          bindings:
            - *ctrl_blinky

        - type: write
          flags: 0
          can_id_start: 0x151
          bindings:
            - *trig_blinky

        - type: write
          flags: 0
          can_id_start: 0x152
          bindings:
            - *cfg_seq_start

        - type: write
          flags: 0
          can_id_start: 0x153
          bindings:
            - *cfg_dwell_off

        - type: write
          flags: 0
          can_id_start: 0x154
          bindings:
            - *cfg_dwell_on

        - type: read_seg
          flags: 0
          can_id_start: 0x160
          bindings:
            - *cfg_seq_states

        - type: write_seg
          flags: 0
          can_id_start: 0x170
          bindings:
            - *cfg_seq_states
