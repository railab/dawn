metadata:
  title: Blinky UDP Demo
  version: "1.0"
  description: >
    Sequencer-based LED blinky demo controlled over the Dawn UDP protocol.
    The sequencer drives the board LED lower-half with a two-state 500 ms
    on/off cycle and exposes runtime start/stop plus writable dwell timing.
  os_required:
    - /dev/leds0
    - udp

ios:
  - id: led1
    type: leds
    dtype: uint32
    config:
      device: 0

includes:
  - id: blinky
    path: include_blocks/blinky_common.yaml
    inputs:
      led: led1

protocols:
  - id: udp1
    type: udp
    bindings:
      - "@blinky.led1"
      - "@blinky.ctrl_blinky"
      - "@blinky.cfg_seq_start"
      - "@blinky.cfg_dwell_off"
      - "@blinky.cfg_dwell_on"
    config:
      port: 50000
