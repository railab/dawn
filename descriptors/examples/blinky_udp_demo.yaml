metadata:
  title: Blinky UDP Demo
  version: "1.0"
  description: >
    Sequencer-based LED blinky demo controlled over the Dawn UDP protocol.
    The sequencer drives the board LED lower-half with a two-state 500 ms
    on/off cycle and exposes runtime start/stop plus writable dwell timing.
  os_required:
    - /dev/leds0
    - udp

ios:
  - id: led1
    type: leds
    dtype: uint32
    config:
      device: 0

  - id: ctrl_blinky
    type: control
    config:
      targets:
        - blinky_seq1
      allowed:
        - start
        - stop

  - id: cfg_seq_start
    type: config
    dtype: uint32
    rw: true
    config:
      objid_ref: blinky_seq1
      objcfg_ref: start_index

  - id: cfg_dwell_off
    type: config
    dtype: uint32
    rw: true
    config:
      objid_ref: blinky_seq1
      objcfg_ref: states
      field: dwell_off

  - id: cfg_dwell_on
    type: config
    dtype: uint32
    rw: true
    config:
      objid_ref: blinky_seq1
      objcfg_ref: states
      field: dwell_on

programs:
  - id: blinky_seq1
    type: sequencer
    config:
      targets:
        - led1
      states:
        - value: 0
          dwell_us: 500000
        - value: 1
          dwell_us: 500000
      start_index: 0

protocols:
  - id: udp1
    type: udp
    bindings:
      - led1
      - ctrl_blinky
      - cfg_seq_start
      - cfg_dwell_off
      - cfg_dwell_on
    config:
      port: 50000
