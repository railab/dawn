metadata:
  title: Blinky Shell Demo
  version: "1.0"
  description: >
    Sequencer-based blinky demo with shell control. The sequencer drives LED
    output with a two-state value/dwell table.
  os_required:
    - /dev/leds0

ios:
  - id: led1
    type: leds
    dtype: uint32
    config:
      device: 0

includes:
  - id: blinky
    path: include_blocks/blinky_common.yaml
    inputs:
      led: led1

protocols:
  - id: shell1
    type: shell
    bindings:
      - "@blinky.led1"
      - "@blinky.ctrl_blinky"
      - "@blinky.trig_blinky"
      - "@blinky.cfg_seq_start"
      - "@blinky.cfg_seq_states"
    config:
      prompt: blinky>
