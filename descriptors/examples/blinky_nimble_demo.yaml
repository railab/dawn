metadata:
  title: Blinky NimBLE Demo
  version: "1.0"
  description: >
    Sequencer-based blinky with BLE control. The sequencer drives an
    LED with a two-state value/dwell table. Start/stop, reset, full states
    table, and individual dwell times are exposed over BLE via a
    NimBLE custom service.
  os_required:
    - /dev/gpio4
    - ble

ios:
  - id: led1
    type: gpo
    dtype: bool
    config:
      device: 4

includes:
  - id: blinky
    path: include_blocks/blinky_common.yaml
    inputs:
      led: led1

protocols:
  - id: nimble1
    type: nimble
    config:
      gap_name: dawn-blink
      services:
        dis:
          enabled: true
        custom:
          - uuid: 12345678-1234-5678-1234-56789abcdef0
            characteristics:
              - uuid: 12345678-1234-5678-1234-56789abcdef1
                io: "@blinky.ctrl_blinky"
                flags:
                  - read
                  - write
              - uuid: 12345678-1234-5678-1234-56789abcdef2
                io: "@blinky.cfg_seq_states"
                flags:
                  - read
                  - write
              - uuid: 12345678-1234-5678-1234-56789abcdef3
                io: "@blinky.cfg_dwell_off"
                flags:
                  - read
                  - write
              - uuid: 12345678-1234-5678-1234-56789abcdef4
                io: "@blinky.cfg_dwell_on"
                flags:
                  - read
                  - write
              - uuid: 12345678-1234-5678-1234-56789abcdef5
                io: "@blinky.trig_blinky"
                flags:
                  - read
                  - write
