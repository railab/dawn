metadata:
  title: Thingy:91 Wakaama LwM2M over LTE
  version: '1.0'
  description: >
    Nordic Thingy:91 demo: bring up LTE, register with the public Eclipse Leshan
    sandbox over Wakaama LwM2M, and expose the on-board sensors as standard
    LwM2M objects. Currently the BME680 environmental sensor (I2C2) provides
    temperature (3303), humidity (3304), barometer (3315) and gas resistance as
    a generic sensor (3300). Additional sensors are added here over time.
  os_required:
  - udp
  - /tmp
  - /dev/uorb/sensor_ambient_temp0
  - /dev/uorb/sensor_humi0
  - /dev/uorb/sensor_baro0
  - /dev/uorb/sensor_gas0
  - /dev/uorb/sensor_rgb0
  - /dev/uorb/sensor_gnss0
  - /dev/batt0
  - /dev/rgbled0
  - /dev/rgbled1
  - /dev/buttons0
system:
- id: lte_main
  type: lte
  config:
    apn: ''
    ip_type: 0
# GNSS/LTE coexistence manager. mode 0 = off: don't touch the radio knobs.
# GNSS gets its sustained window from LTE PSM (set on the lte system), which is
# what lets a cold fix complete; the manager does not interfere.
- id: gnss_manager
  type: gnss
  config:
    # 0=off (LTE only), 1=hybrid (LTE first, then bounded GNSS windows that
    # always hand the radio back so LTE stays reachable indoors).
    mode: 1
    # LTE-first grace: wait up to this long for LTE to connect before the
    # first GNSS attempt (seconds).
    settle: 60
    # Bounded fix-acquisition window; on expiry the radio returns to LTE
    # whether or not a fix landed (seconds). Must exceed a typical cold TTFF -
    # measured ~208s open-sky on this board - so a single window can land a
    # cold fix; the receiver goes cold during the retry cooldown otherwise.
    acquire: 360
    # LTE-reachable cooldown after a failed attempt before retrying (seconds).
    retry: 300
    # Consecutive no-fix windows before giving up. 0 = never give up (keep
    # retrying forever, registration-safe). >0 = after N failures, park on LTE
    # only and re-arm after 'rearm' seconds (good for mostly-indoor devices).
    max_attempts: 0
    # Re-arm delay after giving up (seconds); LTE stays fully reachable.
    rearm: 3600
    # Runtime on/off switch. false = boot LTE-only (GNSS idle); a server turns
    # GNSS on/off live via the custom GNSS control object 33006/0 (bound to this
    # item through the gnss_enable config IO below). mode must be != 0 to enable.
    enabled: false
ios:
- &temperature
  id: bme680_temperature
  type: sensor
  dtype: float
  config:
    device: 0
  subtype: atemp
- &humidity
  id: bme680_humidity
  type: sensor
  dtype: float
  config:
    device: 0
  subtype: hum
- &pressure
  id: bme680_pressure
  type: sensor
  dtype: float
  config:
    device: 0
  subtype: baro
- &gas
  id: bme680_gas
  type: sensor
  dtype: float
  config:
    device: 0
  subtype: gas
# uorb sensor reads are non-blocking and return -EAGAIN between samples, which
# fails an on-demand LwM2M read. A 'latest' program subscribes to each sensor
# (notify) and caches the most recent sample into a virt IO, so the server can
# always fetch the last value. LwM2M binds to these virts, not the sensors.
- &temperature_v
  id: bme680_temperature_latest
  type: virt
  dtype: float
# Self-heating-corrected temperature (see the adjust program below).
- &temperature_adj
  id: bme680_temperature_adj
  type: virt
  dtype: float
# Runtime-writable calibration offset: a config IO onto the temperature adjust
# program's offset word (params[0]). Bound rw to a private resource on object
# 3303 so the offset can be read and written over LwM2M and applied live.
- &temp_offset_cfg
  id: temp_offset_cfg
  type: config
  dtype: float
  rw: true
  config:
    objid_ref: bme680_temperature_adjust
    objcfg_ref: params
    offset: 0
    size: 1
- &humidity_v
  id: bme680_humidity_latest
  type: virt
  dtype: float
- &pressure_v
  id: bme680_pressure_latest
  type: virt
  dtype: float
- &gas_v
  id: bme680_gas_latest
  type: virt
  dtype: float
# BH1749NUC colour sensor (3.3 V rail, enabled by the ADP5360 PMIC at bring-up):
# a single 3-element RGB vector split into per-channel scalars by a vecsplit
# program (the sensor IO is not bound directly).
- &rgb
  id: bh1749_rgb
  type: sensor
  dtype: float
  config:
    device: 0
  subtype: rgb
- &color_r
  id: bh1749_red
  type: virt
  dtype: float
- &color_g
  id: bh1749_green
  type: virt
  dtype: float
- &color_b
  id: bh1749_blue
  type: virt
  dtype: float
# Modem GNSS (/dev/uorb/sensor_gnss0). The nRF9160 reports a rich fix (struct
# sensor_gnss). Rather than the generic float-vector sensor IO, GNSS uses
# dedicated sensor sub-IOs (CIOSensorGnss) that each assemble a logical group
# of fields, so non-float values (time, satellites) get their proper dtype:
#   gnss      -> position+velocity (lat, lon, alt, speed, course) float[5]
#   gnss_time -> UTC time, seconds since epoch                    uint64
#   gnss_info -> accuracy + DOP (eph, epv, hdop, pdop, vdop)      float[5]
#   gnss_sats -> satellites used in the fix                       uint32
# The float groups are fanned out to scalars by vecsplit. The scalars hold
# their init value until the modem acquires a fix. GNSS shares the modem with
# LTE (XSYSTEMMODE=LTE-M+GNSS); the nRF91 driver defers starting the engine
# until the LTE stack has powered the modem.
- &gnss
  id: gnss
  type: sensor
  dtype: float
  config:
    device: 0
  subtype: gnss
- &gnss_time
  id: gnss_time
  type: sensor
  dtype: uint64
  config:
    device: 0
  subtype: gnss_time
- &gnss_info
  id: gnss_info
  type: sensor
  dtype: float
  config:
    device: 0
  subtype: gnss_info
- &gnss_sats
  id: gnss_sats
  type: sensor
  dtype: uint32
  config:
    device: 0
  subtype: gnss_sats
# Position+velocity scalars (split from &gnss, in field order).
- &gnss_lat
  id: gnss_latitude
  type: virt
  dtype: float
- &gnss_lon
  id: gnss_longitude
  type: virt
  dtype: float
- &gnss_alt
  id: gnss_altitude
  type: virt
  dtype: float
- &gnss_speed
  id: gnss_speed
  type: virt
  dtype: float
- &gnss_course
  id: gnss_course
  type: virt
  dtype: float
# Accuracy + DOP scalars (split from &gnss_info, in field order).
- &gnss_eph
  id: gnss_eph
  type: virt
  dtype: float
- &gnss_epv
  id: gnss_epv
  type: virt
  dtype: float
- &gnss_hdop
  id: gnss_hdop
  type: virt
  dtype: float
- &gnss_pdop
  id: gnss_pdop
  type: virt
  dtype: float
- &gnss_vdop
  id: gnss_vdop
  type: virt
  dtype: float
# Scalar GNSS values (time, satellites) are read on demand by the server, but
# the uorb device returns -ENODATA between fixes. A 'latest' program caches the
# most recent sample into a virt (holding the init value until the first fix),
# so the LwM2M read never errors - mirroring the sensor 'latest' pattern.
- &gnss_time_v
  id: gnss_time_latest
  type: virt
  dtype: uint64
- &gnss_sats_v
  id: gnss_sats_latest
  type: virt
  dtype: uint32
# ADP5360 fuel gauge (/dev/batt0). The battery_gauge ioctls read the PMIC
# registers on demand, so these bind directly to LwM2M.
- &battery_voltage
  id: battery_voltage
  type: batt_volt
  dtype: uint32
  config:
    device: 0
- &battery_soc
  id: battery_soc
  type: batt_soc
  dtype: uint32
  config:
    device: 0
- &battery_state
  id: battery_state
  type: batt_state
  dtype: uint32
  config:
    device: 0
# The Thingy:91 has two RGB LEDs behind the 3.3 V rail the ADP5360 PMIC
# enables at bring-up. Each value is a packed 0xRRGGBB colour; binding it rw
# to LwM2M lets the colour be set from the server.
#
# Lightwell LED: the large LED in the enclosure light pipe (PWM0, P0.29/30/31)
# -> /dev/rgbled0.
- &rgb_led
  id: rgbled0
  type: rgb_led
  dtype: uint32
  config:
    device: 0
    init_val: 0x000000
# Sense LED: the small LED next to the sensors (PWM1, P0.0/1/2) -> /dev/rgbled1.
- &rgb_led_sense
  id: rgbled1
  type: rgb_led
  dtype: uint32
  config:
    device: 1
    init_val: 0x000000
# GNSS enable switch: a writable config IO bound to the GNSS manager's 'enabled'
# item. Exposed over LwM2M as the custom GNSS control object 33006/0 (Boolean)
# so the server can turn GNSS on/off at runtime; boots LTE-only (enabled: false).
- &gnss_enable
  id: gnss_enable
  type: config
  dtype: bool
  rw: true
  config:
    objid_ref: gnss_manager
    objcfg_ref: enabled
# User button (SW3, P0.26), interrupt-driven via GPIOTE (/dev/buttons0). The
# value is a bitmask of pressed buttons; bit 0 is the single Thingy:91 button.
- &button
  id: buttons0
  type: buttons
  dtype: uint32
  config:
    device: 0
# LTE modem signal quality. ONE IO polls the NuttX LTE API every 30s and
# returns the whole metric vector [RSRP, RSRQ, SINR, band] (signed dBm/dB ->
# int16); the lte_signal_split vecsplit fans it out into the scalars below,
# which are exposed over LwM2M (Connectivity Monitoring 4 + private 33007).
- &lte_signal
  id: lte_signal
  type: lte_signal
  dtype: int16
  config:
    interval: 30000000
- &lte_rsrp
  id: lte_rsrp
  type: virt
  dtype: int16
- &lte_rsrq
  id: lte_rsrq
  type: virt
  dtype: int16
- &lte_snr
  id: lte_snr
  type: virt
  dtype: int16
- &lte_band
  id: lte_band
  type: virt
  dtype: int16
programs:
- id: bme680_latest
  type: latest
  config:
    sources:
    - *temperature
    - *humidity
    - *pressure
    - *gas
    outputs:
    - *temperature_v
    - *humidity_v
    - *pressure_v
    - *gas_v
# The BME680 reads several degrees high due to gas-heater self-heating and
# enclosure/PCB heat (a known Thingy:91 characteristic). Subtract a fixed,
# reference-calibrated offset before exposing temperature over LwM2M.
- id: bme680_temperature_adjust
  type: adjust
  dtype: float
  config:
    inputs:
    - *temperature_v
    outputs:
    - *temperature_adj
    params:
      offset: -3.5
      scale: 1.0
- id: bh1749_split
  type: vecsplit
  config:
    source: *rgb
    outputs:
    - *color_r
    - *color_g
    - *color_b
- id: gnss_split
  type: vecsplit
  config:
    source: *gnss
    outputs:
    - *gnss_lat
    - *gnss_lon
    - *gnss_alt
    - *gnss_speed
    - *gnss_course
- id: gnss_info_split
  type: vecsplit
  config:
    source: *gnss_info
    outputs:
    - *gnss_eph
    - *gnss_epv
    - *gnss_hdop
    - *gnss_pdop
    - *gnss_vdop
# Fan the LTE signal vector [RSRP, RSRQ, SINR, band] out to scalars.
- id: lte_signal_split
  type: vecsplit
  config:
    source: *lte_signal
    outputs:
    - *lte_rsrp
    - *lte_rsrq
    - *lte_snr
    - *lte_band
- id: gnss_latest
  type: latest
  config:
    sources:
    - *gnss_time
    - *gnss_sats
    outputs:
    - *gnss_time_v
    - *gnss_sats_v
protocols:
- id: wakaama_main
  type: wakaama
  config:
    endpoint: dawn-thingy91-leshan
    server_host: 23.97.187.154
    local_port: 56832
    # Binding mode: U = always reachable (server pushes downlinks immediately);
    # UQ = LwM2M Queue Mode (server queues downlinks, delivers when the device
    # next sends an uplink). Use UQ for sleepy/PSM operation; U for interactive.
    queue_mode: false
    servers:
        # Registration lifetime (seconds). On cellular this doubles as the NAT
        # keepalive: each registration update is an uplink that refreshes the
        # operator's UDP binding, so the lifetime must stay below the network's
        # NAT timeout (~150-300s here) or the device becomes unreachable between
        # updates. With Queue Mode a longer lifetime is fine (downlinks queue).
      - host: 23.97.187.154
        port: 5683
        lifetime: 120
        short_server_id: 123
    device:
      manufacturer: Dawn
      serial_number: dawn-thingy91-leshan
      firmware_version: '0.1'
      # ADP5360 battery telemetry on the standard LwM2M Device object (3):
      # /3/0/7 Power Source Voltage, /3/0/9 Battery Level, /3/0/20 Battery
      # Status.
      battery_voltage: *battery_voltage
      battery_level: *battery_soc
      battery_status: *battery_state
    objects:
      - object: temperature
        instance: 0
        resources:
        - resource: sensor_value
          io: *temperature_adj
          access: read
        # Private/manufacturer-specific resource: calibration offset (deg C),
        # read/write over LwM2M to trim the self-heating correction at runtime.
        - resource_id: 26241
          io: *temp_offset_cfg
          access: rw
      - object: humidity
        instance: 0
        resources:
        - resource: sensor_value
          io: *humidity_v
          access: read
      - object: barometer
        instance: 0
        resources:
        - resource: sensor_value
          io: *pressure_v
          access: read
      - object: generic_sensor
        instance: 0
        resources:
        - resource: sensor_value
          io: *gas_v
          access: read
      # Custom colour object (private id 33001): BH1749NUC red/green/blue counts
      # on resources 0/1/2, fed by the vecsplit outputs.
      - object_id: 33001
        instance: 0
        resources:
        - resource_id: 0
          io: *color_r
          access: read
        - resource_id: 1
          io: *color_g
          access: read
        - resource_id: 2
          io: *color_b
          access: read
      # Standard LwM2M Location object (6), fed from the modem GNSS:
      #   /6/0/0 Latitude, /6/0/1 Longitude, /6/0/2 Altitude,
      #   /6/0/3 Radius (horizontal accuracy, eph), /6/0/5 Timestamp (UTC
      #   seconds, gnss_time), /6/0/6 Speed (ground speed).
      - object_id: 6
        instance: 0
        resources:
        - resource_id: 0
          io: *gnss_lat
          access: read
        - resource_id: 1
          io: *gnss_lon
          access: read
        - resource_id: 2
          io: *gnss_alt
          access: read
        - resource_id: 3
          io: *gnss_eph
          access: read
        - resource_id: 5
          io: *gnss_time_v
          access: read
        - resource_id: 6
          io: *gnss_speed
          access: read
      # Custom GNSS-info object (private id 33005): the remaining fix quality
      # data that has no standard Location resource. 0=satellites used,
      # 1=course (deg), 2=vertical accuracy epv (m), 3=HDOP, 4=PDOP, 5=VDOP.
      - object_id: 33005
        instance: 0
        resources:
        - resource_id: 0
          io: *gnss_sats_v
          access: read
        - resource_id: 1
          io: *gnss_course
          access: read
        - resource_id: 2
          io: *gnss_epv
          access: read
        - resource_id: 3
          io: *gnss_hdop
          access: read
        - resource_id: 4
          io: *gnss_pdop
          access: read
        - resource_id: 5
          io: *gnss_vdop
          access: read
      # Custom RGB LED objects: resource 0 is the packed 0xRRGGBB colour,
      # writable (and readable) over LwM2M so the LED can be controlled from
      # the server. Encoded as an integer; write e.g. 0xFF0000 (16711680) for
      # red. 33002 = lightwell LED (/dev/rgbled0), 33003 = sense LED
      # (/dev/rgbled1).
      - object_id: 33002
        instance: 0
        resources:
        - resource_id: 0
          io: *rgb_led
          access: rw
      - object_id: 33003
        instance: 0
        resources:
        - resource_id: 0
          io: *rgb_led_sense
          access: rw
      # Manufacturer-specific GNSS control object (private id 33006): resource 0
      # is the runtime GNSS enable switch (Boolean, rw). No standard LwM2M object
      # describes "enable a GNSS subsystem", so a custom object is used (in line
      # with 33001-33005). Write true to start GNSS, false to stop and return to
      # LTE-only. Bound to the GNSS manager's 'enabled' item via gnss_enable.
      - object_id: 33006
        instance: 0
        resources:
        - resource_id: 0
          io: *gnss_enable
          access: rw
      # Standard IPSO Push button object (3347): resource 5500 "Digital Input
      # State" reflects /dev/buttons0 (the user button, bit 0). Observe it from
      # the server to be notified on press/release.
      - object_id: 3347
        instance: 0
        resources:
        - resource_id: 5500
          io: *button
          access: read
      # Standard LwM2M Connectivity Monitoring object (4): 4/0/2 Radio Signal
      # Strength (RSRP, dBm) and 4/0/3 Link Quality (RSRQ, dB), read live from
      # the modem. Use these to monitor LTE-M coverage from the server.
      - object_id: 4
        instance: 0
        resources:
        - resource_id: 2
          io: *lte_rsrp
          access: read
        - resource_id: 3
          io: *lte_rsrq
          access: read
      # Manufacturer-specific LTE diagnostics object (private id 33007): metrics
      # with no standard Connectivity Monitoring resource. 0 = SNR (dB),
      # 1 = serving E-UTRA band number. Read-only.
      - object_id: 33007
        instance: 0
        resources:
        - resource_id: 0
          io: *lte_snr
          access: read
        - resource_id: 1
          io: *lte_band
          access: read
