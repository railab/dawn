metadata:
  title: Blinky Modbus TCP Demo
  version: "1.0"
  description: >
    Sequencer-based LED blinky demo controlled from a Modbus TCP client.
    The sequencer runs on a 500 ms on/off cycle and exposes runtime state
    plus writable dwell parameters through coil and holding registers.
  os_required:
    - /dev/leds0
    - tcp

ios:
  - id: led1
    type: leds
    dtype: uint32
    config:
      device: 0

includes:
  - id: blinky
    path: include_blocks/blinky_common.yaml
    inputs:
      led: led1

protocols:
  - id: modbus1
    type: modbus_tcp
    bindings:
      - "@blinky.led1"
      - "@blinky.ctrl_blinky"
      - "@blinky.cfg_seq_start"
      - "@blinky.cfg_dwell_off"
      - "@blinky.cfg_dwell_on"
    config:
      port: 5020
      registers:
        - type: coil
          start: 0
          bindings:
            - "@blinky.ctrl_blinky"
        - type: holding
          start: 0x0100
          bindings:
            - "@blinky.cfg_seq_start"
            - "@blinky.led1"
            - "@blinky.cfg_dwell_off"
            - "@blinky.cfg_dwell_on"
