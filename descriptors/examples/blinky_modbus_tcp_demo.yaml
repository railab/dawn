metadata:
  title: Blinky Modbus TCP Demo
  version: "1.0"
  description: >
    Sequencer-based LED blinky demo controlled from a Modbus TCP client.
    The sequencer runs on a 500 ms on/off cycle and exposes runtime state
    plus writable dwell parameters through coil and holding registers.
  os_required:
    - /dev/leds0
    - tcp

ios:
  - id: led1
    type: leds
    dtype: uint32
    config:
      device: 0

  - id: ctrl_blinky
    type: control
    config:
      targets:
        - blinky_seq1
      allowed:
        - start
        - stop

  - id: cfg_seq_start
    type: config
    dtype: uint32
    rw: true
    config:
      objid_ref: blinky_seq1
      objcfg_ref: start_index

  - id: cfg_dwell_off
    type: config
    dtype: uint32
    rw: true
    config:
      objid_ref: blinky_seq1
      objcfg_ref: states
      field: dwell_off

  - id: cfg_dwell_on
    type: config
    dtype: uint32
    rw: true
    config:
      objid_ref: blinky_seq1
      objcfg_ref: states
      field: dwell_on

programs:
  - id: blinky_seq1
    type: sequencer
    config:
      targets:
        - led1
      states:
        - value: 0
          dwell_us: 500000
        - value: 1
          dwell_us: 500000
      start_index: 0

protocols:
  - id: modbus1
    type: modbus_tcp
    bindings:
      - led1
      - ctrl_blinky
      - cfg_seq_start
      - cfg_dwell_off
      - cfg_dwell_on
    config:
      port: 5020
      registers:
        - type: coil
          start: 0
          bindings:
            - ctrl_blinky
        - type: holding
          start: 0x0100
          bindings:
            - cfg_seq_start
            - led1
            - cfg_dwell_off
            - cfg_dwell_on
