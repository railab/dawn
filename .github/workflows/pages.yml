name: Publish documentation

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Sphinx and Doxygen docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Documentation/requirements.txt

      - name: Install documentation tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            doxygen \
            graphviz \
            plantuml

      - name: Install Python documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Documentation/requirements.txt

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build HTML documentation
        run: make -C Documentation html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Documentation/_build/html

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
