name: Documentation build

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: docs-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Sphinx and Doxygen docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Documentation/requirements.txt

      - name: Install documentation tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            doxygen \
            graphviz \
            plantuml

      - name: Install Python documentation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Documentation/requirements.txt

      - name: Build HTML documentation
        run: make -C Documentation html
