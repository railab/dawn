config:
  cwd: './external'
  build_dir: './build'
  build_env:
    CC: 'gcc-14'
    CXX: 'g++-14'

product:
  name: "dawn-sim-modbus-rtu"
  cores:
    core0:
      name: 'main'
      device: 'sim'
      defconfig: '../../boards/sim/sim/sim/configs/nsh_modbus_rtu'
      dcmake:
        CMAKE_SUPPRESS_DEVELOPER_WARNINGS: "ON"
